name: Site check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required public files
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "index.html"
            "styles.css"
            "app-ads.txt"
            "robots.txt"
            "sitemap.xml"
            "apps/dio/index.html"
            "apps/dio/privacy.html"
            "apps/dio/support.html"
            "apps/yomuhon/index.html"
            "apps/yomuhon/privacy.html"
            "apps/yomuhon/support.html"
          )

          for file in "${required[@]}"; do
            test -f "$file" || {
              echo "Missing required file: $file"
              exit 1
            }
          done

      - name: Validate app-ads.txt
        shell: bash
        run: |
          set -euo pipefail

          expected='google.com, pub-9387651710889691, DIRECT, f08c47fec0942fa0'
          actual="$(tr -d '\r' < app-ads.txt | sed '/^[[:space:]]*$/d')"

          test "$actual" = "$expected" || {
            echo "app-ads.txt does not match the authorized seller declaration."
            exit 1
          }

      - name: Reject macOS metadata
        shell: bash
        run: |
          set -euo pipefail

          if find . -name '.DS_Store' -print -quit | grep -q .; then
            echo ".DS_Store must not be committed."
            exit 1
          fi

      - name: Check local HTML references
        shell: python
        run: |
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit

          root = Path(".").resolve()
          failures = []

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.refs = []

              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if tag == "a" and values.get("href"):
                      self.refs.append(("href", values["href"]))
                  if tag in {"img", "script"} and values.get("src"):
                      self.refs.append(("src", values["src"]))
                  if tag == "link" and values.get("href"):
                      self.refs.append(("href", values["href"]))

          for html_file in Path(".").rglob("*.html"):
              parser = Parser()
              parser.feed(html_file.read_text(encoding="utf-8"))

              for kind, ref in parser.refs:
                  if (
                      not ref
                      or ref.startswith(("#", "mailto:", "tel:", "data:", "javascript:"))
                  ):
                      continue

                  parsed = urlsplit(ref)
                  if parsed.scheme in {"http", "https"} or parsed.netloc:
                      continue

                  clean = parsed.path
                  if not clean:
                      continue

                  if clean.startswith("/"):
                      target = root / clean.lstrip("/")
                  else:
                      target = html_file.parent / clean

                  target = target.resolve()

                  if target.is_dir():
                      target = target / "index.html"

                  if not target.exists():
                      failures.append(f"{html_file}: broken {kind}={ref}")

          if failures:
              print("\n".join(failures))
              raise SystemExit(1)

          print("Local HTML references are valid.")
